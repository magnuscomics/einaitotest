/* --- General body styles --- */
body {
    text-align: center;
    font-family: Arial, sans-serif;
    background-color: #000000;  /* Black background */
    color: #ffffff;             /* White text */
    margin: 0;
    padding: 0;
}

/* --- Images --- */
img {
    max-width: 90%;
    height: auto;
    display: block;
    margin: 0 auto;
}

/* --- Navigation bar --- */
nav {
    margin-bottom: 20px;
    display: inline-block;       /* keeps nav compact */
}

/* --- Menu items --- */
nav a {
    text-decoration: none;
    color: #ffffff;
    background-color: #555555;  /* grey boxes */
    padding: 10px 20px;
    margin: 0;                  /* remove gaps */
    border-radius: 0;           /* no rounding */
    display: inline-block;
    transition: background-color 0.3s;
}

/* Round only first and last boxes */
nav a:first-child {
    border-top-left-radius: 8px;
    border-bottom-left-radius: 8px;
}

nav a:last-child {
    border-top-right-radius: 8px;
    border-bottom-right-radius: 8px;
}

/* Hover effect */
nav a:hover {
    background-color: #990000;  /* dark red on hover */
}
</style>
